# ==========================================
# Orch — all-in-one local stack
# ==========================================
#
# Clone the repo and run everything from source:
#
#   docker compose up --build
#
# Then open http://localhost:3047/orch
#
# Services: PostgreSQL, Zookeeper, Kafka, Kafka UI, DB migrate (one-shot),
#           Orch Web (Next.js), Orch Broker (Rust).
# ==========================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: orch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orchiodb
    ports:
      - "5447:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - orch-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: orch-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - orch-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: orch-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # INTERNAL: for services inside the compose network (kafka:9092)
      # EXTERNAL: for apps running on the host during local dev (localhost:29092)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - orch-network

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: orch-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic audit-logs --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic event-logs --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --list
      "
    networks:
      - orch-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: orch-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9048:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - orch-network

  # One-shot: apply Prisma migrations, then exit. The web app waits for this
  # to finish (service_completed_successfully) before starting.
  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: builder
    container_name: orch-migrate
    restart: "no"
    command: ["sh", "-c", "cd apps/web && npx prisma migrate deploy"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/orchiodb
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - orch-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: orch-web
    restart: unless-stopped
    ports:
      - "3047:3047"
    environment:
      - PORT=3047
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/orchiodb
      - ORCH_BROKER_URL=http://broker:8047
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - orch-network

  broker:
    build:
      context: ./apps/orch-broker
      dockerfile: Dockerfile
    container_name: orch-broker
    restart: unless-stopped
    ports:
      - "8047:8047"
    environment:
      - PORT=8047
      - RUST_LOG=info
      - API_BASE_URL=http://web:3047/orch
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/orchiodb
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - orch-network

volumes:
  postgres_data:
  kafka_data:
  zookeeper_data:

networks:
  orch-network:
    driver: bridge
