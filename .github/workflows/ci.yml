name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  RUST_VERSION: '1.85'

jobs:
  # ---- Lint + Type Check Web ----
  web-lint:
    name: Web Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

  # ---- Build Web ----
  web-build:
    name: Build Web
    runs-on: ubuntu-latest
    needs: web-lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: orchiodb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/orchiodb
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:migrate
      - run: pnpm build

  # ---- Rust Broker Build + Test ----
  broker-build:
    name: Broker Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (librdkafka)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libssl-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/orch-broker

      - name: Format check
        working-directory: apps/orch-broker
        run: cargo fmt --all -- --check
        continue-on-error: true  # warn but don't fail yet

      - name: Clippy
        working-directory: apps/orch-broker
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true  # warn but don't fail — pre-existing warnings

      - name: Build release
        working-directory: apps/orch-broker
        run: cargo build --release

      - name: Test
        working-directory: apps/orch-broker
        run: cargo test --release

  # ---- Security scan ----
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # report only, don't fail build
          format: 'table'

  # ---- Summary ----
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [web-lint, web-build, broker-build, security]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.web-lint.result }}" != "success" ] || \
             [ "${{ needs.web-build.result }}" != "success" ] || \
             [ "${{ needs.broker-build.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required jobs passed"
